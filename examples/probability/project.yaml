# Project manifest -- the ordering spine for the whole video series.
# Single source of truth for: sequence, status, prereqs, and how chapters
# break into section videos (this project's budget is ~6 min/video; the
# framework supports 5-20 min, set per project below). The intro/outro
# template and the assembly step both read this file, so neighbor
# relationships (recap/bridge) stay consistent automatically.

project:
  title: Undergraduate Probability I
  # Read-only parent sources. Editable working copies are vendored to sources/
  # (tools/vendor_sources.py) and are what the pipeline actually builds from.
  upstream_dir: input/Probability
  # Render + voice defaults (override per build for finals).
  render:
    quality: ql            # ql = 480p draft; qh = 1080p final (fps follows manim's quality preset)
  voice:
    provider: gtts         # gtts (free draft) -> openai (final)
    rate: 1.0
  pedagogy:
    target_minutes_per_video: 6   # framework supports 5-20; this course chose 6
    open_with_objective: true     # state the learning goal up front
    close_with_key_idea: true     # one-line takeaway = retrieval cue
    recap_prior: true             # reactivate the previous video (spacing)

# Notation convention as data (prose rationale in NOTATION.md).
# Enforced by tools/check_notation.py; tools/normalize_notation.py applies the
# `use:` replacement to sources/*.tex working copies. Patterns are literal
# LaTeX strings (escaped automatically), not regexes.
notation:
  rules:
    - avoid: '\mathbb{P}'
      use: '\Pr'
      reason: probability
    - avoid: '\mathbb{E}'
      use: '\mathrm{E}'
      reason: expectation
    - avoid: '\mathbb{V}'
      use: '\mathrm{Var}'
      reason: variance
    - avoid: '\operatorname{E}'
      use: '\mathrm{E}'
      reason: expectation
    - avoid: '\mathbb{1}'
      use: '\mathbf{1}'
      reason: indicator

# stage:  planned -> scripted -> built -> rendered -> approved
# status flows independently from the markdown layers' own status gate.

