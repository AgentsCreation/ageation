# Pipeline gates — everything that can run without a render.
#
# Rendering (manim + LaTeX + TTS) is deliberately NOT attempted here: manimpango
# has no prebuilt wheel for CI Linux and rendering needs a real machine (see
# PIPELINE.md). The gates + tests below need only Python and PyYAML, so they run
# via `uv run --no-project` without building the full project environment.

name: gates

on:
  push:
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Syntax-check tools and scenes
        run: >
          uv run --no-project --with pyyaml python -m py_compile
          tools/*.py scenes/*.py examples/probability/scenes/*.py test_scene.py

      - name: Sync gate (example project)
        run: uv run --no-project --with pyyaml python tools/check_sync.py --project examples/probability

      - name: Notation gate (example project)
        run: uv run --no-project --with pyyaml python tools/check_notation.py --project examples/probability

      - name: Review-status gate (example project)
        run: uv run --no-project --with pyyaml python tools/check_status.py --project examples/probability

      - name: Render selection dry-run (example project)
        run: uv run --no-project --with pyyaml python tools/render.py --project examples/probability --dry-run

      - name: Tool test suite
        run: uv run --no-project --with pyyaml --with pytest python -m pytest tests/ -q
